<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartes de grêle</title>
  <style>
    :root {
      --bleu: #1d4ed8;
      --bleu-fonce: #1e3a8a;
      --gris: #f3f4f6;
      --texte: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--gris);
      color: var(--texte);
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 540px;
      width: 100%;
      padding: 2.25rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    p.sub { margin: 0 0 1.75rem; color: #6b7280; font-size: 0.95rem; }
    .drop {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop.drag { border-color: var(--bleu); background: #eff6ff; }
    .drop input { display: none; }
    .drop .icon { font-size: 2.5rem; }
    .filename { margin-top: 0.75rem; font-weight: 600; color: var(--bleu-fonce); }
    button {
      margin-top: 1.5rem;
      width: 100%;
      background: var(--bleu);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled) { background: var(--bleu-fonce); }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.error { background: #fef2f2; color: #b91c1c; display: block; }
    .msg.info { background: #eff6ff; color: #1e3a8a; display: block; }
    .hint { margin-top: 1.5rem; font-size: 0.8rem; color: #9ca3af; }
    code { background: #f1f5f9; padding: 0.1rem 0.35rem; border-radius: 4px; }
    .spinner {
      display: inline-block; width: 1em; height: 1em;
      border: 2px solid rgba(255,255,255,.5); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -0.15em;
      margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌧️ Cartes de grêle</h1>
    <p class="sub">Déposez votre fichier Excel au format <strong>Classeur1</strong>
      (colonnes <code>C_I_SOCS</code> et <code>ANC_REF</code>) pour générer et
      télécharger les cartes.</p>

    <form id="form">
      <label class="drop" id="drop">
        <div class="icon">📄</div>
        <div id="droptext">Cliquez ou glissez votre fichier <code>.xlsx</code> ici</div>
        <div class="filename" id="filename"></div>
        <input type="file" id="file" name="file" accept=".xlsx,.xls" required />
      </label>
      <button type="submit" id="submit" disabled>Générer les cartes</button>
    </form>

    <div class="msg" id="msg"></div>

    <p class="hint">Le téléchargement contient deux cartes HTML interactives
      (<code>grele_1_points.html</code> et <code>grele_2_polygones.html</code>)
      ainsi qu'un rapport qualité.</p>
  </div>

  <script>
    const drop = document.getElementById("drop");
    const input = document.getElementById("file");
    const filenameEl = document.getElementById("filename");
    const submit = document.getElementById("submit");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }
    function clearMsg() { msg.className = "msg"; msg.textContent = ""; }

    function onFile() {
      if (input.files.length) {
        filenameEl.textContent = input.files[0].name;
        submit.disabled = false;
        clearMsg();
      } else {
        filenameEl.textContent = "";
        submit.disabled = true;
      }
    }
    input.addEventListener("change", onFile);

    ["dragenter", "dragover"].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); }));
    ["dragleave", "drop"].forEach(ev =>
      drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); }));
    drop.addEventListener("drop", e => {
      if (e.dataTransfer.files.length) { input.files = e.dataTransfer.files; onFile(); }
    });

    form.addEventListener("submit", async e => {
      e.preventDefault();
      if (!input.files.length) return;
      submit.disabled = true;
      submit.innerHTML = '<span class="spinner"></span>Génération en cours…';
      showMsg("Traitement du fichier, cela peut prendre quelques secondes…", "info");

      try {
        const data = new FormData();
        data.append("file", input.files[0]);
        const resp = await fetch("/generate", { method: "POST", body: data });

        if (!resp.ok) {
          let detail = "Erreur lors de la génération.";
          try { detail = (await resp.json()).detail || detail; } catch (_) {}
          throw new Error(detail);
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "cartes_grele.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showMsg("✅ Cartes générées et téléchargées.", "info");
      } catch (err) {
        showMsg("❌ " + err.message, "error");
      } finally {
        submit.disabled = false;
        submit.textContent = "Générer les cartes";
      }
    });
  </script>
</body>
</html>
